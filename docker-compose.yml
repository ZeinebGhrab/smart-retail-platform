# ============================================================
# ShopAnalytics — Anavid Smart Retail Platform
#
# Structure :
#   frontend/   → App Ionic React (Vite)
#   backend/    → API Django REST + RAG Ollama
#   mysql/   → Base de données mysql
#
# Commandes rapides :
#   docker compose up frontend          → front seul (dev)
#   docker compose up ollama            → LLM seul
#   docker compose run --rm benchmark   → benchmark one-shot
#   docker compose up django_api        → API seule
# ============================================================

services:
  # ── Database MySQL ───────────────────────────────────────────────────────────
  mysql:
   image: mysql:8.0
   container_name: shop-anavid-int-mysql
   restart: unless-stopped
   environment:
     MYSQL_DATABASE: shop-anavid-int
     MYSQL_USER: shopuser
     MYSQL_PASSWORD: shoppassword
     MYSQL_ROOT_PASSWORD: rootpassword
   ports:
     - "3306:3306"
   volumes:
     - mysql_data:/var/lib/mysql
   healthcheck:
     test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ushopuser", "-pshoppassword"]
     interval: 10s
     timeout: 5s
     retries: 5
   networks:
     - shop-anavid-int_net

  # ── phpMyAdmin — Interface web MySQL ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: shop-anavid-int-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=rootpassword
    networks:
      - shop-anavid-int_net

  # ── LLM local ────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.6.8
    container_name: shop-anavid-int-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_FLASH_ATTENTION=false
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5 &&
        ollama pull llama3.2:3b-instruct-q4_K_M &&
        ollama pull nomic-embed-text &&
        wait
      "
    #deploy:
    #resources:
    #reservations:
    #devices:
    #- driver: nvidia
    #count: all
    #capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shop-anavid-int_net

  # ── Benchmark one-shot ───────────────────────────────────────────────────────
  benchmark:
    image: python:3.11-slim
    container_name: shop-anavid-int-benchmark
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        pip install -q requests colorama tabulate &&
        python scripts/pull_models.py &&
        python scripts/benchmark.py
      "
    restart: "no"
    networks:
      - shop-anavid-int_net

  # ── Backend Django — API REST + RAG ─────────────────────────────────────────
  django_api:
    build:
      context: ./backend
      dockerfile: django_api/Dockerfile
    container_name: shop-anavid-int-django-api
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/django_api:/app
      - ./backend/scripts:/app/scripts
      - ./backend/data:/app/data
      - ./backend/dataset:/app/dataset
      - ./backend/results:/app/results
      - ./modele-ML:/modele-ML:ro
    environment:
      - DJANGO_DEBUG=true
      - DB_ENGINE=mysql
      - DB_NAME=shop-anavid-int
      - DB_USER=shopuser
      - DB_PASSWORD=shoppassword
      - DB_HOST=mysql
      - DB_PORT=3306
      - VISITOR_DATA_CSV=/app/data/shoppingclub_2025_2026.csv
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b-instruct-q4_K_M
      # FIX 1 — Modèle dédié aux embeddings KB (séparé du modèle de génération).
      # nomic-embed-text est optimisé pour la recherche sémantique contrairement
      # à llama3.2 qui est un modèle de génération. Taille : ~274 MB.
      # ⚠️  Après avoir changé cette valeur, redémarrer django_api pour vider
      #     le cache _kb_embeddings (calculé une seule fois au premier appel).
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      # ── CORS / CSRF — origines autorisées pour le frontend ──────────────────
      # Doit inclure CHAQUE hostname utilisé pour ouvrir le frontend dans le
      # navigateur (localhost ET l'IP réseau si tu y accèdes depuis ce host-là).
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      # ── Gmail SMTP ───────────────────────────────────────────────────────────
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=true
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      # ── Firebase Cloud Messaging (Service Account) ────────────────────────
      # À récupérer : Firebase Console → Paramètres du projet →
      # Comptes de service → Générer une nouvelle clé privée.
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - FCM_CLIENT_EMAIL=${FCM_CLIENT_EMAIL}
      - FCM_PRIVATE_KEY=${FCM_PRIVATE_KEY}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request as u; u.urlopen(''http://localhost:8000/api/schema/'', timeout=3)" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      shop-anavid-int_net:
        aliases:
          - shop-anavid-int-django-api  # ancien alias existant
          - django-api                  # ✅ alias RFC-valide pour n8n (sans underscore)

  # ── ML Model API — Visitor Profile Prediction ───────────────────────────────
  visitor_ml_api:
    build:
      context: ./modele-ML
      dockerfile: Dockerfile
    container_name: shop-anavid-int-visitor-ml-api
    ports:
      - "8001:8000"
    volumes:
      - ./modele-ML/xgboost_visitor_mvp.pkl:/app/xgboost_visitor_mvp.pkl:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request as u; u.urlopen(''http://localhost:8000/health'', timeout=3)" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      shop-anavid-int_net:
        aliases:
          - visitor-ml-api              # ✅ alias RFC-valide pour n8n (sans underscore)

  # ── Frontend Ionic React — dev (hot-reload) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: shop-anavid-int-anavidapp
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app # volume dev → Vite lit .env du host
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      # ── Firebase / FCM — lues par Vite via import.meta.env ───────────────
      # ⚠️  Ces variables DOUBLENT celles du .env comme filet de sécurité.
      #     Vite en mode dev avec volume lit directement frontend/.env ;
      #     les env Docker ci-dessous couvrent les cas où le .env est absent.
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
      - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped
    networks:
      - shop-anavid-int_net

  # ── Orchestrateur de workflows — N8N ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: shop-anavid-int-n8n
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
      django_api:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://shop-anavid-int-n8n:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_COMMUNITY_PACKAGES_ENABLED=false
      - EXTERNAL_FRONTEND_HOOKS_URLS=
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    networks:
      - shop-anavid-int_net

volumes:
  mysql_data:
    name: shop-anavid-int_mysql_data
  ollama_models:
    name: shop-anavid-int_ollama_models
  frontend_node_modules:
    name: shop-anavid-int_frontend_node_modules
  n8n_data:
    name: shop-anavid-int_n8n_data

networks:
  shop-anavid-int_net:
    name: shop-anavid-int_net
    driver: bridge