# ============================================================
# ShopAnalytics — Anavid Smart Retail Platform
#
# Structure :
#   frontend/   → App Ionic React (Vite)
#   backend/    → API Django REST + RAG Ollama
#
# Commandes rapides :
#   docker compose up frontend          → front seul (dev)
#   docker compose up ollama            → LLM seul
#   docker compose run --rm benchmark   → benchmark one-shot
#   docker compose up django_api        → API seule
# ============================================================

services:

  # ── LLM local ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: shopanalytics-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Benchmark one-shot ───────────────────────────────────────
  benchmark:
    image: python:3.11-slim
    container_name: shopanalytics-benchmark
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        pip install -q requests colorama tabulate &&
        python scripts/pull_models.py &&
        python scripts/benchmark.py
      "
    restart: "no"

  # ── Backend Django — API REST + RAG ─────────────────────────
  # Accès    : http://localhost:8000/api/
  # Swagger  : http://localhost:8000/api/docs/
  # Chat RAG : POST http://localhost:8000/api/chat/
  django_api:
    build:
      context: ./backend
      dockerfile: django_api/Dockerfile
    container_name: shopanalytics-django-api
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/django_api:/app
      - ./backend/scripts:/workspace/scripts 
      - ./backend/data:/app/data
      - ./backend/dataset:/app/dataset
      - ./backend/results:/app/results
    environment:
      - DJANGO_DEBUG=true
      - VISITOR_DATA_CSV=/app/data/shoppingclub_2025_2026.csv
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b-instruct-q4_K_M
    restart: unless-stopped

  # ── Frontend Ionic React — dev (hot-reload) ──────────────────
  # Accès : http://localhost:5173
  frontend:
    build:
      context: ./frontend
    container_name: shopanalytics-anavidapp
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  ollama_models:
    name: shopanalytics_ollama_models
  frontend_node_modules:
    name: shopanalytics_frontend_node_modules