# ============================================================
# ShopAnalytics — Anavid Smart Retail Platform
#
# Structure :
#   frontend/   → App Ionic React (Vite)
#   backend/    → API Django REST + RAG Ollama
#
# Commandes rapides :
#   docker compose up frontend          → front seul (dev)
#   docker compose up ollama            → LLM seul
#   docker compose run --rm benchmark   → benchmark one-shot
#   docker compose up django_api        → API seule
# ============================================================

services:

  # ── LLM local ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: shopanalytics-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Benchmark one-shot ───────────────────────────────────────
  benchmark:
    image: python:3.11-slim
    container_name: shopanalytics-benchmark
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        pip install -q requests colorama tabulate &&
        python scripts/pull_models.py &&
        python scripts/benchmark.py
      "
    restart: "no"

  # ── Backend Django — API REST + RAG ─────────────────────────
  django_api:
    build:
      context: ./backend
      dockerfile: django_api/Dockerfile
    container_name: shopanalytics-django-api
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/django_api:/app
      - ./backend/scripts:/workspace/scripts
      - ./backend/data:/app/data
      - ./backend/dataset:/app/dataset
      - ./backend/results:/app/results
    environment:
      - DJANGO_DEBUG=true
      - VISITOR_DATA_CSV=/app/data/shoppingclub_2025_2026.csv
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b-instruct-q4_K_M
      # ── Gmail SMTP ───────────────────────────────────────────
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=true
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      # ── Firebase Cloud Messaging (Service Account) ────────────
      # À récupérer : Firebase Console → Paramètres du projet →
      # Comptes de service → Générer une nouvelle clé privée.
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - FCM_CLIENT_EMAIL=${FCM_CLIENT_EMAIL}
      - FCM_PRIVATE_KEY=${FCM_PRIVATE_KEY}
    restart: unless-stopped

  # ── Frontend Ionic React — dev (hot-reload) ──────────────────
  frontend:
    build:
      context: ./frontend
    container_name: shopanalytics-anavidapp
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                        # volume dev → Vite lit .env du host
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      # ── Firebase / FCM — lues par Vite via import.meta.env ───
      # ⚠️  Ces variables DOUBLENT celles du .env comme filet de sécurité.
      #     Vite en mode dev avec volume lit directement frontend/.env ;
      #     les env Docker ci-dessous couvrent les cas où le .env est absent.
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
      - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped

  # ── Orchestrateur de workflows — N8N ─────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: shopanalytics-n8n
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      django_api:
        condition: service_started
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.home/node/.n8n
      - ./backend/n8n/workflows:/workflows

volumes:
  ollama_models:
    name: shopanalytics_ollama_models
  frontend_node_modules:
    name: shopanalytics_frontend_node_modules
  n8n_data:
    name: shopanalytics_n8n_data