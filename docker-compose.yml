# ============================================================
# ShopAnalytics — Anavid Smart Retail Platform
#
# Structure :
#   frontend/   → App Ionic React (Vite)
#   backend/    → Agent RAG Python + Benchmark Ollama
#
# Commandes rapides :
#   docker compose up frontend          → front seul (dev)
#   docker compose up ollama            → LLM seul
#   docker compose run --rm benchmark   → benchmark one-shot
#   make ask Q="Combien de visiteurs ?" → interroger l'agent
# ============================================================

services:

  # ── LLM local ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: shopanalytics-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Benchmark one-shot ───────────────────────────────────────
  benchmark:
    image: python:3.11-slim
    container_name: shopanalytics-benchmark
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/workspace/scripts
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        pip install -q requests colorama tabulate &&
        python scripts/pull_models.py &&
        python scripts/benchmark.py
      "
    restart: "no"

  # ── Agent RAG (chatbot visiteurs + FAQ) ─────────────────────
  # Usage : docker compose run --rm agent python visitor_agent.py "Question ?"
  agent:
    build:
      context: ./backend
    container_name: shopanalytics-agent
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend/app:/workspace/app
      - ./backend/data:/workspace/data
      - ./backend/dataset:/workspace/dataset
      - ./backend/results:/workspace/results
      - ./backend/vector_db:/workspace/vector_db
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        python vector_store.py --reindex &&
        tail -f /dev/null
      "
    restart: "no"

  # ── Backend Django — API historique / analytics + RAG ────────
  # Accès : http://localhost:8000/api/
  # Chat IA : POST http://localhost:8000/api/chat/
  django_api:
    build:
      context: ./backend
      dockerfile: django_api/Dockerfile
    container_name: shopanalytics-django-api
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/django_api:/app
      - ./backend/data:/app/data
      # Partagé avec le conteneur agent : index vectoriel ChromaDB
      - ./backend/vector_db:/app/vector_db
      # Partagé avec le conteneur agent : knowledge_base.json
      - ./backend/dataset:/app/dataset
      # Modèle retenu après benchmark
      - ./backend/results:/app/results
    environment:
      - DJANGO_DEBUG=true
      - VISITOR_DATA_CSV=/app/data/shoppingclub_2025_2026.csv
      # Ollama accessible via le réseau Docker interne
      - OLLAMA_HOST=http://ollama:11434
      # Modèle retenu lors du benchmark (eligible_models.json)
      - OLLAMA_MODEL=llama3.2:3b-instruct-q4_K_M
    restart: unless-stopped

  # ── Frontend Ionic React — dev (hot-reload) ──────────────────
  # Accès : http://localhost:5173
  frontend:
    build:
      context: ./frontend
    container_name: shopanalytics-anavidapp
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  ollama_models:
    name: shopanalytics_ollama_models
  frontend_node_modules:
    name: shopanalytics_frontend_node_modules