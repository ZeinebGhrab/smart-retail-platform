# ============================================================
# ShopAnalytics — Ollama LLM Benchmark Stack + anavidApp
# Usage : docker compose up -d
# ============================================================

services:
  ollama:
    image: ollama/ollama:latest
    container_name: shopanalytics-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts:/workspace/scripts
      - ./dataset:/workspace/dataset
      - ./results:/workspace/results
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Service one-shot : pull les modèles puis lance le benchmark
  benchmark:
    image: python:3.11-slim
    container_name: shopanalytics-benchmark
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./scripts:/workspace/scripts
      - ./dataset:/workspace/dataset
      - ./results:/workspace/results
    working_dir: /workspace
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        pip install -q requests colorama tabulate &&
        python scripts/pull_models.py &&
        python scripts/benchmark.py
      "
    restart: "no"

  # Agent chatbot RAG (visiteurs + base vectorielle FAQ)
  agent:
    image: python:3.11-slim
    container_name: shopanalytics-agent
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./app:/workspace/app
      - ./data:/workspace/data
      - ./dataset:/workspace/dataset
      - ./vector_db:/workspace/vector_db
    working_dir: /workspace/app
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    command: >
      bash -c "
        pip install -q -r requirements.txt &&
        python vector_store.py --reindex &&
        tail -f /dev/null
      "
    restart: "no"

  # ── Frontend Ionic React — dev (hot-reload) ─────────────────
  # Démarrer seul : docker compose up frontend
  # Accès           : http://localhost:5173
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend       
    container_name: shopanalytics-anavidapp
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                          # hot-reload : code source en live
      - shopanalytics_node_modules:/app/node_modules   # node_modules isolé dans un volume
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  ollama_models:
    name: shopanalytics_ollama_models
  shopanalytics_node_modules:
    name: shopanalytics_node_modules